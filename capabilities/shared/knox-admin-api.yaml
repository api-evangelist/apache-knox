naftiko: "1.0.0-alpha1"

info:
  label: "Apache Knox Admin REST API"
  description: "Shared per-API capability for the Apache Knox Admin REST API covering topology, descriptor, and provider configuration management."
  tags:
    - Apache Knox
    - API Gateway
    - Hadoop Security
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      KNOX_ADMIN_PASSWORD: KNOX_ADMIN_PASSWORD

capability:
  consumes:
    - type: http
      namespace: knox-admin
      baseUri: https://localhost:8443/gateway/admin
      description: "Apache Knox Admin REST API"
      authentication:
        type: basic
        username: admin
        password: "{{KNOX_ADMIN_PASSWORD}}"
      resources:
        - name: topologies
          path: /api/v1/topologies
          description: Topology management
          operations:
            - name: list-topologies
              method: GET
              description: List all topologies
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-topology
              method: POST
              description: Create a topology
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-topology
              method: GET
              description: Get a topology
              inputParameters:
                - name: topologyName
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-topology
              method: DELETE
              description: Delete a topology
              inputParameters:
                - name: topologyName
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: knox-admin-exposed
      resources:
        - path: /v1/topologies
          operations:
            - method: GET
              name: list-topologies
              call: "knox-admin.list-topologies"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: knox-admin-mcp
      transport: http
      tools:
        - name: list-topologies
          description: List all Knox gateway topologies
          hints:
            readOnly: true
          call: "knox-admin.list-topologies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-topology
          description: Get details of a specific Knox topology
          hints:
            readOnly: true
          call: "knox-admin.get-topology"
          with:
            topologyName: "tools.topology_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-topology
          description: Delete a Knox gateway topology
          hints:
            readOnly: false
            destructive: true
          call: "knox-admin.delete-topology"
          with:
            topologyName: "tools.topology_name"
          outputParameters:
            - type: object
              mapping: "$."

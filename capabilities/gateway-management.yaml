naftiko: 1.0.0-alpha2
info:
  label: Apache Knox Gateway Management
  description: Workflow capability for Hadoop administrators and security engineers to manage Knox gateway topologies, service
    descriptors, and provider configurations.
  tags:
  - Apache Knox
  - Gateway Management
  - Hadoop Administration
  - Security Engineering
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    KNOX_ADMIN_PASSWORD: KNOX_ADMIN_PASSWORD
capability:
  consumes:
  - type: http
    namespace: knox-admin
    baseUri: https://localhost:8443/gateway/admin
    description: Apache Knox Admin REST API
    authentication:
      type: basic
      username: admin
      password: '{{KNOX_ADMIN_PASSWORD}}'
    resources:
    - name: topologies
      path: /api/v1/topologies
      description: Topology management
      operations:
      - name: list-topologies
        method: GET
        description: List all topologies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-topology
        method: POST
        description: Create a topology
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-topology
        method: GET
        description: Get a topology
        inputParameters:
        - name: topologyName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-topology
        method: DELETE
        description: Delete a topology
        inputParameters:
        - name: topologyName
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: knox-gateway-management-api
    description: Unified REST API for Apache Knox gateway management.
    resources:
    - path: /v1/topologies
      name: topologies
      operations:
      - method: GET
        name: list-topologies
        call: knox-admin.list-topologies
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-topology
        call: knox-admin.create-topology
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-topology
        call: knox-admin.delete-topology
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: knox-gateway-management-mcp
    transport: http
    description: MCP server for AI-assisted Apache Knox gateway management.
    tools:
    - name: list-topologies
      description: List all Knox gateway topologies and their service URLs
      hints:
        readOnly: true
        openWorld: true
      call: knox-admin.list-topologies
      outputParameters:
      - type: object
        mapping: $.
    - name: get-topology
      description: Get the configuration details of a specific Knox topology
      hints:
        readOnly: true
        openWorld: true
      call: knox-admin.get-topology
      with:
        topologyName: tools.topology_name
      outputParameters:
      - type: object
        mapping: $.
    - name: create-topology
      description: Create or update a Knox gateway topology
      hints:
        readOnly: false
      call: knox-admin.create-topology
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-topology
      description: Delete a Knox gateway topology
      hints:
        readOnly: false
        destructive: true
      call: knox-admin.delete-topology
      with:
        topologyName: tools.topology_name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-knox-version
      description: Get Apache Knox gateway version information
      hints:
        readOnly: true
      call: knox-admin.get-version
      outputParameters:
      - type: object
        mapping: $.

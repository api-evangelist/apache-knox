aid: apache-knox
name: Apache Knox
description: Apache Knox is a REST API and application gateway for the Apache Hadoop ecosystem. It provides a single access
  point for all REST and HTTP interactions with Apache Hadoop clusters, with authentication, authorization, SSO, and audit
  capabilities. Governed by the Apache Software Foundation under Apache 2.0.
